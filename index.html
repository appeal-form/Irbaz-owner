<!DOCTYPE html>
<html>
<head>
  <title>Pro Partner System</title>
</head>
<body>

<h2>Signup / Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<hr>

<h2>Invite Partner</h2>
<input type="email" id="inviteEmail" placeholder="Partner Email">
<button onclick="sendInvite()">Send Invite</button>

<hr>

<h2 id="status"></h2>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "XXXX",
  authDomain: "XXXX",
  projectId: "XXXX",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Signup
function signup() {
  let email = email.value;
  let password = password.value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Signup Success"));
}

// Login
function login() {
  let email = email.value;
  let password = password.value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => alert("Login Success"));
}

// Invite
function sendInvite() {
  let email = document.getElementById("inviteEmail").value;
  let token = Math.random().toString(36).substring(7);

  let link = window.location.origin + "?token=" + token;

  db.collection("invites").add({
    email: email,
    token: token,
    role: "pending"
  });

  alert("Invite Link: " + link);
}

// Accept Invite (auto)
window.onload = function() {
  let params = new URLSearchParams(window.location.search);
  let token = params.get("token");

  if (token) {
    db.collection("invites")
      .where("token", "==", token)
      .get()
      .then(snapshot => {
        snapshot.forEach(doc => {
          db.collection("invites").doc(doc.id).update({
            role: "partner"
          });
          document.getElementById("status").innerText = "You are now Partner!";
        });
      });
  }
};
</script>

</body>
</html>
