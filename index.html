<script>
function login(){
  document.getElementById("msg").innerText="Login Success ✅";

  // ⏳ 1 second baad redirect
  setTimeout(()=>{
    window.location.href = "dashboard.html";
  },1000);
}

function sendInvite(){
  let email = document.getElementById("inviteEmail").value;
  let token = Math.random().toString(36).substr(2,6);

  let invites = JSON.parse(localStorage.getItem("invites")) || [];
  invites.push({email, token, status:"invited"});
  localStorage.setItem("invites", JSON.stringify(invites));

  let link = "join.html?token="+token;

  document.getElementById("msg").innerText = "Invite Link: "+link;

  // Optional redirect
  setTimeout(()=>{
    window.location.href = link;
  },2000);
}
</script>
